apiVersion: v1
kind: Namespace
metadata:
  name: distalgo-system
---
apiVersion: v1
kind: Secret
metadata:
  name: distalgo-minio-secret
  namespace: distalgo-system
type: Opaque
stringData:
  MINIO_ROOT_USER: distalgo
  MINIO_ROOT_PASSWORD: distalgo-password
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: distalgo-minio
  namespace: distalgo-system
  labels:
    app.kubernetes.io/name: distalgo-minio
    app.kubernetes.io/part-of: distalgo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: distalgo-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: distalgo-minio
        app.kubernetes.io/part-of: distalgo
    spec:
      containers:
        - name: minio
          image: quay.io/minio/minio:RELEASE.2024-01-16T16-07-38Z
          imagePullPolicy: IfNotPresent
          args:
            - server
            - /data
            - --console-address
            - :9001
          envFrom:
            - secretRef:
                name: distalgo-minio-secret
          ports:
            - name: api
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: api
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: distalgo-minio
  namespace: distalgo-system
  labels:
    app.kubernetes.io/name: distalgo-minio
    app.kubernetes.io/part-of: distalgo
spec:
  selector:
    app.kubernetes.io/name: distalgo-minio
  ports:
    - name: api
      port: 9000
      targetPort: api
    - name: console
      port: 9001
      targetPort: console
