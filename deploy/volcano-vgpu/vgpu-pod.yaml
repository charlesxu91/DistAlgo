apiVersion: v1
kind: Pod
metadata:
  name: distalgo-volcano-vgpu-single
  namespace: volcano-demo
spec:
  schedulerName: volcano
  restartPolicy: Never
  containers:
  - name: cuda
    image: nvidia/cuda:12.4.1-base-ubuntu22.04
    imagePullPolicy: IfNotPresent
    command:
    - bash
    - -lc
    - |
      env | grep -E 'CUDA|NVIDIA|VGPU|VOLCANO' || true
      nvidia-smi
      sleep 60
    resources:
      limits:
        volcano.sh/vgpu-number: 1
        volcano.sh/vgpu-memory: 2000
        volcano.sh/vgpu-cores: 30
