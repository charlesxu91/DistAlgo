services:
  distalgo:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["python", "-m", "distalgo.cli", "list-algorithms"]
    ports:
      - "8000:8000"

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: distalgo
      MINIO_ROOT_PASSWORD: distalgo-password
    ports:
      - "9000:9000"
      - "9001:9001"

  prometheus:
    image: prom/prometheus:v2.49.1
    volumes:
      - ./observability/prometheus-config.yaml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
